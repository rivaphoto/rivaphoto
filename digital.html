<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexa Rivadeneira — Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#101010;
    --muted:#9a9892;
    --surface:#f2f1ee;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    font-weight:300;
  }

  nav{
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(6px);
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 32px;
    border-bottom:1px solid #eeece6;
  }
  nav .logo{
    font-size:14px;
    letter-spacing:4px;
    font-weight:500;
    text-transform:uppercase;
    color:inherit;
    text-decoration:none;
  }
  nav .links{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:12px 22px;
    list-style:none;
  }
  nav .links a{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink);
    text-decoration:none;
    font-weight:400;
    white-space:nowrap;
  }
  nav .links a:hover{ color:var(--muted); }
  nav .links .nav-label{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    white-space:nowrap;
  }

  .intro{
    max-width:640px;
    margin:0 auto;
    padding:90px 32px 70px;
    text-align:center;
  }
  .intro p{
    font-size:15px;
    line-height:1.8;
    color:var(--muted);
    letter-spacing:0.2px;
  }

  main{
    max-width:1100px;
    margin:0 auto;
    padding:0 32px 100px;
  }

  section.book{
    margin-bottom:80px;
  }
  .book-title{
    text-align:center;
    font-size:12px;
    letter-spacing:5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:36px;
  }
  .book-subtitle{
    text-align:center;
    font-size:13px;
    line-height:1.8;
    color:var(--muted);
    letter-spacing:0.2px;
    margin:-16px 0 36px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
  }
  figure{ margin:0; }
  .plate{
    width:100%;
    aspect-ratio:3/2;
    background:var(--surface);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    overflow:hidden;
  }
  .plate img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  figcaption{
    margin-top:12px;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
  }

  footer{
    max-width:1100px;
    margin:0 auto;
    padding:40px 32px 100px;
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    border-top:1px solid #eeece6;
  }

  /* lightbox */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.98);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:100;
    padding:40px 24px;
  }
  .lightbox.active{ display:flex; }
  .lightbox .lb-plate{
    width:auto;
    height:auto;
    max-width:min(800px, 90vw);
    max-height:78vh;
    background:var(--surface);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:12px;
  }
  .lb-plate img{
    display:block;
    max-width:min(800px, 90vw);
    max-height:78vh;
    width:auto;
    height:auto;
    object-fit:contain;
  }
  .lb-caption{
    margin-top:18px;
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .lb-close{
    position:absolute;
    top:28px;
    right:32px;
    background:none;
    border:none;
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
  }

  @media (max-width:640px){
    nav{ flex-wrap:wrap; gap:12px 0; }
    nav .links{ gap:10px 14px; justify-content:flex-start; }
    nav .links a{ font-size:10px; letter-spacing:1px; }
    .grid{ grid-template-columns:repeat(2, 1fr); gap:14px; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Alexa Rivadeneira</a>
  <ul class="links">
    <li class="nav-label">Film</li>
    <li><a href="index.html#portraits">Portraits</a></li>
    <li><a href="index.html#travel">Travel</a></li>
    <li><a href="index.html#street">Street Photography</a></li>
    <li><a href="index.html#views">Views</a></li>
    <li><a href="digital.html">Digital</a></li>
  </ul>
</nav>

<main id="gallery-root">
  <!-- Sections are generated from gallery-data.js at load time. -->
</main>

<footer>Alexa Rivadeneira · New York</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">Close ✕</button>
  <div class="lb-plate" id="lb-image">Photo</div>
  <p class="lb-caption" id="lb-caption"></p>
</div>

<script src="gallery-data.js"></script>
<script>
  const SECTION_ORDER = ['digital'];

  function renderGalleries(){
    const root = document.getElementById('gallery-root');
    root.innerHTML = SECTION_ORDER.map(function(key){
      const gallery = GALLERIES[key];
      if (!gallery) return '';
      const subtitle = gallery.subtitle
        ? '<p class="book-subtitle">' + gallery.subtitle + '</p>'
        : '';
      const figures = gallery.images.map(function(file){
        const src = 'images/' + file;
        return '<figure>' +
          '<div class="plate" onclick="openLB(\'' + gallery.title + '\', \'' + src + '\')">' +
          '<img src="' + src + '" alt="' + gallery.title + '" loading="lazy"></div>' +
          '</figure>';
      }).join('');
      return '<section class="book" id="' + key + '">' +
        '<p class="book-title">' + gallery.title + '</p>' +
        subtitle +
        '<div class="grid">' + figures + '</div>' +
        '</section>';
    }).join('');
  }

  function openLB(caption, src){
    document.getElementById('lb-caption').textContent = caption;
    const img = document.getElementById('lb-image');
    if(src){
      img.innerHTML = '<img src="' + src + '" alt="' + caption + '">';
    } else {
      img.innerHTML = 'Photo';
    }
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLB(){
    document.getElementById('lightbox').classList.remove('active');
  }
  document.getElementById('lightbox').addEventListener('click', function(e){
    if(e.target === this) closeLB();
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeLB();
  });

  renderGalleries();
</script>

</body>
</html>
